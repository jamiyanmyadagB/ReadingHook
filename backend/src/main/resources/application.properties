# ========================================
# Application Configuration
# ========================================
spring.application.name=readingnook

# ========================================
# Server Configuration
# ========================================
server.port=8080

# ========================================
# Database Configuration
# ========================================
# MongoDB connection URI - set via environment variable or system property
# Falls back to local MongoDB if not set
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/readingnook}

# ========================================
# External API Configuration
# ========================================
# Gemini API Key - set via environment variable
# Get from: https://aistudio.google.com/app/apikey
gemini.api.key=${GEMINI_API_KEY:placeholder-api-key}

# ========================================
# File Upload Configuration
# ========================================
# Maximum file size for multipart uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ========================================
# Character Encoding Configuration
# ========================================
# Force UTF-8 encoding for all requests and responses
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ========================================
# Logging Configuration
# ========================================
# Application logging levels
logging.level.com.readingnook=INFO
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.springframework.web=INFO

# Root logging level
logging.level.root=INFO

# ========================================
# Jackson Configuration
# ========================================
# JSON serialization settings
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=NON_NULL
